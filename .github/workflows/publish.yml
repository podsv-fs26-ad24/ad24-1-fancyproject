on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Quarto’s Python engine needs the same env as local dev (nbformat, jupyter, bokeh, …).
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync Python dependencies
        run: uv sync

      # story.qmd executes Python that reads data/dataset.csv (not committed).
      - name: Download dataset for render
        run: |
          mkdir -p data
          curl -fsSL -L -o data/dataset.csv "https://drive.switch.ch/index.php/s/Q4iQaQ3vxqzNFeY/download"

      - name: Install librsvg
        run: sudo apt-get install -y librsvg2-bin

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      # Composite render@v2 does not reliably inherit job env for Quarto’s kernel; run explicitly.
      - name: Render Quarto project
        env:
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python
          QUARTO_PRINT_STACK: "true"
        run: |
          set -euo pipefail
          test -x "${QUARTO_PYTHON}"
          "${QUARTO_PYTHON}" -c "import nbformat; import bokeh, pandas; print('Python deps OK')"
          quarto render docs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
